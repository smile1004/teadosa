<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술검토 보고서 샘플</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#eceff1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:14px;
  min-height:auto;
}
.report{
  width:560px;
  max-width:100%;
  background:#fff;
  box-shadow:0 15px 50px rgba(0,0,0,.18);
  border-radius:6px;
  overflow:hidden;
}
.report img{
  width:100%;
  display:block;
}
</style>
</head>
<body>
<div class="report">
  <img src="sample1.png" alt="기술검토 보고서 샘플">
</div>
</body>
</html>
