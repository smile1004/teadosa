<!DOCTYPE html>

<html lang="ko">
<head>
<base href="../../">
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>무료 사전 검토 신청</title>
<link href="common/css/service-steps.css" rel="stylesheet"><link href="common/css/shared-layout.css" rel="stylesheet">
<link href="common/css/shared-menu.css" rel="stylesheet">
<link href="common/css/common.css" rel="stylesheet">
<link href="precheck/apply/css/style.css" rel="stylesheet"></head>
<body class="">
<script src="common/js/site-config.js"></script>
<script src="common/js/components/header.js"></script><main class="step-unified-shell"><section class="service-step-hero">
<div class="service-step-label">STEP 01</div>
<h1>사전검토 신청서</h1>
<p>태양광 설치 가능 여부 확인을 위해 기본 정보를 입력해 주세요.</p>
</section><div class="step-unified-content"><div class="wrap">
<section class="card">
<div class="form-head">
<h2>신청 정보 입력</h2>
<p>입력하신 정보를 기준으로 설치 가능 여부 검토에 필요한 기본 확인이 진행됩니다.</p>
</div>
<form id="preCheckForm">
<div class="grid">
<div class="field">
<label for="name">이름 <span class="required">*</span></label>
<input id="name" name="name" placeholder="이름을 입력해 주세요" required="" type="text">
</div>
<div class="field">
<label for="phone">연락처 <span class="required">*</span></label>
<input id="phone" name="phone" placeholder="010-0000-0000" required="" type="tel">
</div>
<div class="field full">
<label for="address">설치주소 <span class="required">*</span></label>
<input id="address" name="address" placeholder="태양광 설치를 검토할 주소를 입력해 주세요" required="" type="text">
</div>
<div class="field">
<label>사업지 유형 <span class="required">*</span></label>
<div class="choice-row">
<label class="choice">
<input name="siteType" required="" type="radio" value="토지">
<span>토지</span>
</label>
<label class="choice">
<input name="siteType" type="radio" value="건물">
<span>건물</span>
</label>
</div>
</div>
<div class="field">
<label>용도 <span class="required">*</span></label>
<div class="choice-row">
<label class="choice">
<input name="purpose" required="" type="radio" value="자가소비">
<span>자가소비</span>
</label>
<label class="choice">
<input name="purpose" type="radio" value="발전사업">
<span>발전사업</span>
</label>
</div>
</div>
<div class="field full">
<label for="memo">추가 요청사항</label>
<textarea id="memo" name="memo" placeholder="검토에 참고할 내용이 있다면 입력해 주세요"></textarea>
</div>
</div>
<div class="guide">
            신청 내용은 사전 확인용으로 활용되며, 실제 설치 가능 여부는 현장 여건·건축물 상태·한전 계통 여건 등에 따라 달라질 수 있습니다.
          </div>
<div class="form-buttons">
<button class="btn-submit" type="submit">신청하기</button>
<button class="btn-reset" type="reset">초기화</button>
</div>
</form>
</section>
<section aria-live="polite" class="result" id="resultBox">
<div class="result-title">
<h3>신청 결과</h3>
<span class="status">접수 정보 확인</span>
</div>
<div class="result-list">
<div class="result-item">
<strong>이름</strong>
<span id="resultName"></span>
</div>
<div class="result-item">
<strong>연락처</strong>
<span id="resultPhone"></span>
</div>
<div class="result-item full">
<strong>설치주소</strong>
<span id="resultAddress"></span>
</div>
<div class="result-item">
<strong>사업지 유형</strong>
<span id="resultSiteType"></span>
</div>
<div class="result-item">
<strong>용도</strong>
<span id="resultPurpose"></span>
</div>
<div class="result-item full">
<strong>추가 요청사항</strong>
<span id="resultMemo"></span>
</div>
</div>
<p class="result-note">입력하신 내용을 확인 후 필요 시 상세 검토를 위한 추가 안내가 진행됩니다.</p>
<div class="result-actions">
<button class="btn-result-check" onclick="checkResult()" type="button">결과 확인하기</button>
</div>
</section>
</div></div></main>
<script src="common/js/components/footer.js"></script>
<script src="precheck/apply/js/script.js"></script></body>
</html>
