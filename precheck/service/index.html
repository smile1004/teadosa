<!DOCTYPE html>

<html lang="ko">
<head>
<base href="../../">
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>발전사업 가능 서비스 확인</title>
<link href="common/css/service-steps.css" rel="stylesheet"><link href="common/css/shared-layout.css" rel="stylesheet">
<link href="common/css/shared-menu.css" rel="stylesheet">
<link href="common/css/common.css" rel="stylesheet">
<link href="precheck/service/css/style.css" rel="stylesheet"></head>
<body class="">
<script src="common/js/site-config.js"></script>
<script src="common/js/components/header.js"></script><main class="step-unified-shell"><section class="service-step-hero">
<div class="service-step-label">STEP 03</div>
<h1>발전사업 가능 서비스 확인</h1>
<p>사전검토 결과를 바탕으로 진행 가능한 패키지와 개별 서비스를 확인하세요.</p>
</section><div class="step-unified-content"><section class="summary">
<div class="summary-card"><span>검토 결과</span><strong>조건부 가능</strong></div>
<div class="summary-card"><span>사업지 유형</span><strong id="summaryType">토지형</strong></div>
<div class="summary-card"><span>서비스 범위</span><strong>RPS 전체 절차</strong></div>
</section><section class="section">
<div class="section-head">
<div>
<h2>신청 가능한 서비스</h2>
<p class="section-desc">각 항목 앞의 체크표시는 부지검토 결과 기준으로 신청 가능한 서비스입니다.</p>
</div>
<div class="toggle-area">
<button class="type-btn active" data-type="land">토지형</button>
<button class="type-btn" data-type="building">건물형</button>
</div>
</div>
<div class="service-list" id="serviceList"></div>
<div class="total-box">
<div>
<p>예상 전체 비용</p>
<strong id="totalPrice">7,600,000원 ~ 9,800,000원</strong>
</div>
<button class="package-btn" onclick="showToast('패키지 상담 신청으로 연결됩니다.')">패키지 상담받기</button>
</div>
</section><section class="section">
<h2>추천 패키지</h2>
<p class="section-desc">필요한 행정 절차를 묶어 진행할 수 있는 패키지 구성입니다.</p>
<table class="package-table" id="packageTable"></table>
</section></div></main>
<script src="common/js/components/footer.js"></script>
<script src="precheck/service/js/script.js"></script></body>
</html>
